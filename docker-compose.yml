services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: dram_bridge
      MYSQL_USER: dram_bridge
      MYSQL_PASSWORD: dram_bridge
      MYSQL_ROOT_PASSWORD: dram_bridge_root
    volumes:
      - dram_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udram_bridge", "-pdram_bridge"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dram_mysql:
