spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dram_bridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: dram_bridge
    password: dram_bridge
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true

app:
  dram:
    snapshot:
      enabled: false
      purchase-price:
      etf-ticker: DRAM
      etf-exchange: BATS
      holdings:
        - ticker: MU
          name: Micron Technology
          exchange: NASDAQ
          currency: USD
          weight: 0.2383
        - ticker: SNDK
          name: SanDisk
          exchange: NASDAQ
          currency: USD
          weight: 0.0466
        - ticker: WDC
          name: Western Digital
          exchange: NASDAQ
          currency: USD
          weight: 0.0464
        - ticker: STX
          name: Seagate Technology
          exchange: NASDAQ
          currency: USD
          weight: 0.0449
  provider:
    twelvedata:
      enabled: false
      api-key: ${TWELVE_DATA_API_KEY:}
      base-url: https://api.twelvedata.com
      symbols:
        dram:
          symbol: DRAM
          exchange: BATS
          name: Roundhill Memory ETF
          currency: USD
        mu:
          symbol: MU
          exchange: NASDAQ
          name: Micron Technology
          currency: USD
        sndk:
          symbol: SNDK
          exchange: NASDAQ
          name: SanDisk
          currency: USD
        wdc:
          symbol: WDC
          exchange: NASDAQ
          name: Western Digital
          currency: USD
        stx:
          symbol: STX
          exchange: NASDAQ
          name: Seagate Technology
          currency: USD
        sk-hynix:
          symbol: "000660"
          exchange: XKRX
          name: SK hynix
          currency: KRW
        samsung:
          symbol: "005930"
          exchange: XKRX
          name: Samsung Electronics
          currency: KRW
  ingest:
    enabled: false
    file:
    exit-after-run: false
    schedule:
      enabled: false
      mode: file
      zone: America/Chicago
      morning-cron: "0 0 2 * * MON-FRI"
      evening-cron: "0 30 16 * * MON-FRI"
