spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dram_bridge?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: dram_bridge
    password: dram_bridge
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true

app:
  ingest:
    enabled: false
    file:
    exit-after-run: false
    schedule:
      enabled: false
      zone: America/Chicago
      morning-cron: "0 0 2 * * MON-FRI"
      evening-cron: "0 30 16 * * MON-FRI"
