spring:
  application:
    name: dram-bridge-model
  profiles:
    active: local

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  dram:
    snapshot:
      enabled: false
      purchase-price:
      etf-ticker: DRAM
      etf-exchange: BATS
      holdings: []
  provider:
    twelvedata:
      enabled: false
      api-key: ${TWELVE_DATA_API_KEY:}
      base-url: https://api.twelvedata.com
  market-data:
    freshness:
      max-age-hours: 18
      required-prices: BATS:DRAM,NASDAQ:MU,NASDAQ:SNDK,NASDAQ:WDC,NASDAQ:STX
